services:
  postgres:
    image: postgres:18.3
    container_name: chronos-kanban-postgres
    environment:
      POSTGRES_DB: chronos_kanban
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chronos-kanban-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chronos_kanban
      SPRING_DATASOURCE_USERNAME: chronos
      SPRING_DATASOURCE_PASSWORD: chronos
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: